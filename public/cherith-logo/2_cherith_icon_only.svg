<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -200 300 380" width="100%" height="100%">
  <defs>
    <!-- hex pattern grey -->
    <pattern id="hex-grey" width="34.64" height="60" patternUnits="userSpaceOnUse" patternTransform="scale(0.55)">
      <path fill="none" stroke="#D3D3D3" stroke-width="3" d="M34.64 15L17.32 5 0 15v20l17.32 10 17.32-10V15z M0 45l17.32 10 17.32-10M17.32 55L17.32 65M17.32 5L17.32 -5"/>
    </pattern>

    <!-- hex pattern background -->
    <pattern id="hex-white" width="34.64" height="60" patternUnits="userSpaceOnUse" patternTransform="scale(0.55)">
      <path fill="none" stroke="#FFFFFF" stroke-width="3" d="M34.64 15L17.32 5 0 15v20l17.32 10 17.32-10V15z M0 45l17.32 10 17.32-10M17.32 55L17.32 65M17.32 5L17.32 -5"/>
    </pattern>

    <path id="pinPath" fill-rule="evenodd" clip-rule="evenodd" d="M 0 160 C 40 120 80 60 80 0 A 80 80 0 1 0 -80 0 C -80 60 -40 120 0 160 Z M 0 -62 A 62 62 0 1 1 0 62 A 62 62 0 1 1 0 -62 Z"/>
    
    <clipPath id="pinClip">
      <use href="#pinPath" />
    </clipPath>

    <radialGradient id="fadeGridGrey" cx="-30" cy="110" r="90" gradientUnits="userSpaceOnUse">
       <stop stop-color="white" stop-opacity="1" offset="0%"/>
       <stop stop-color="white" stop-opacity="0" offset="100%"/>
    </radialGradient>
    <mask id="greyHexMask">
      <rect x="-150" y="0" width="150" height="200" fill="url(#fadeGridGrey)"/>
    </mask>

    <linearGradient id="fadeGridWhite" x1="0" y1="160" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.8" offset="0%"/>
      <stop stop-color="white" stop-opacity="0" offset="100%"/>
    </linearGradient>
    <mask id="whiteHexMask">
      <rect x="-80" y="-80" width="160" height="250" fill="url(#fadeGridWhite)"/>
    </mask>
  </defs>

  

  <!-- ICON -->
    <g transform="translate(0,0)">
    <!-- Grey Hexagons out -->
    <rect x="-150" y="0" width="150" height="200" fill="url(#hex-grey)" mask="url(#greyHexMask)"/>

    <!-- Map pin -->
    <use href="#pinPath" fill="#E31B23"/>
    <rect x="-80" y="-80" width="160" height="250" fill="url(#hex-white)" clip-path="url(#pinClip)" mask="url(#whiteHexMask)"/>
    
    <!-- Inner circle fill (the hole) -->
    <circle cx="0" cy="0" r="62" fill="#FFFFFF"/>
    
    <!-- Outer blue concentric circle inner -->
    <circle cx="0" cy="0" r="54" fill="none" stroke="#263678" stroke-width="2.5"/>

    <!-- Drone -->
    <g transform="translate(0, -12) scale(0.8)">
      <!-- body -->
      <rect x="-15" y="-14" width="30" height="8" rx="2" fill="#263678"/>
      <!-- arms -->
      <line x1="-15" y1="-10" x2="-45" y2="-10" stroke="#263678" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="15" y1="-10" x2="45" y2="-10" stroke="#263678" stroke-width="2.5" stroke-linecap="round"/>
      <!-- props -->
      <line x1="-55" y1="-16" x2="-35" y2="-16" stroke="#263678" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="35" y1="-16" x2="55" y2="-16" stroke="#263678" stroke-width="1.8" stroke-linecap="round"/>
      <!-- shafts -->
      <line x1="-45" y1="-10" x2="-45" y2="-16" stroke="#263678" stroke-width="2"/>
      <line x1="45" y1="-10" x2="45" y2="-16" stroke="#263678" stroke-width="2"/>
      <!-- legs -->
      <polyline points="-13,2 -10,-6 -7,2" fill="none" stroke="#263678" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-16" y1="2" x2="-4" y2="2" stroke="#263678" stroke-width="2" stroke-linecap="round"/>
      <polyline points="7,2 10,-6 13,2" fill="none" stroke="#263678" stroke-width="2" stroke-linejoin="round"/>
      <line x1="4" y1="2" x2="16" y2="2" stroke="#263678" stroke-width="2" stroke-linecap="round"/>
    </g>

    <text x="0" y="27" font-family="'Montserrat', 'Century Gothic', 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="#E31B23" text-anchor="middle" letter-spacing="1">RTK</text>

    <!-- Antenna -->
    <g transform="translate(0, -85)">
      <line x1="0" y1="5" x2="0" y2="-15" stroke="#E31B23" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-16" r="3.7" fill="#E31B23"/>
      <!-- left arcs (flipped horizontally) -->
      <path d="M -9,-6 A 14 14 0 0 0 -9,8" fill="none" stroke="#E31B23" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M -15,-12 A 22 22 0 0 0 -15,14" fill="none" stroke="#E31B23" stroke-width="2.5" stroke-linecap="round"/>
      <!-- right arcs -->
      <path d="M 9,-6 A 14 14 0 0 1 9,8" fill="none" stroke="#E31B23" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 15,-12 A 22 22 0 0 1 15,14" fill="none" stroke="#E31B23" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Blue Waves (approx angle 20 to 80 deg) -->
    <path d="M 34.2 -94 A 100 100 0 0 1 96.6 -25.9" fill="none" stroke="#263678" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 39.3 -108.1 A 115 115 0 0 1 111.1 -29.8" fill="none" stroke="#263678" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 44.5 -122.2 A 130 130 0 0 1 125.6 -33.7" fill="none" stroke="#263678" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Red Dots exiting diagonal -->
    <!-- centers roughly on line x = R*0.5, y = -R*0.866 -->
    <circle cx="72.5" cy="-125.6" r="4" fill="#E31B23"/>
    <circle cx="82.5" cy="-142.9" r="6" fill="#E31B23"/>
    <circle cx="97.5" cy="-168.9" r="8" fill="#E31B23"/>
  </g>

  <!-- TEXT -->
  
</svg>